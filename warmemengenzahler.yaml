esphome:
  name: warmemengenzahler
  friendly_name: Wärmemengenzähler

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "WpC5kp0IDzTVAj6Zjy1jRVSM8C8QyxHRWsTf56CkfY8="

ota:
  - platform: esphome
    password: "3dc8778b5fd79a38b337f7fd60c54e3b"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none 
  output_power: 17dB

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Warmemengenzahler"
    password: "SgEBGb3ntoZ0"

captive_portal:

# -------------------------------------------------------
# MQTT für Home Assistant
# -------------------------------------------------------
mqtt:
  broker: !secret mqtt_broker   # IP deines Home Assistant MQTT Brokers
  username: !secret mqtt_username
  password: !secret mqtt_passwort
  topic_prefix: "waermemengenzaehler"
  discovery: true
  discovery_prefix: "homeassistant"
  port: 1883

external_components:
  - source:
      type: git
      url: https://github.com/Cellinski/Waermemengenzaehler
      ref: main
    components:
      - mbus
      refresh: 0s
#external_components:
#  - source:
#      type: local
#      path: components
#    components: [mbus]
    
uart:
  - tx_pin: GPIO4
    rx_pin: GPIO5
    baud_rate: 2400
    parity: EVEN

mbus:
  
sensor:
  - platform: mbus
    name: "Temperaturdifferenz"
    mbus_vife: 0xE0
    filters:
     - multiply: 0.1
    unit_of_measurement: K
